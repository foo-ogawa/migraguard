services:
  postgres:
    image: postgres:16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: migraguard_test
      POSTGRES_PASSWORD: migraguard_test
      POSTGRES_DB: migraguard_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migraguard_test"]
      interval: 2s
      timeout: 5s
      retries: 10
